# =====================================================================
# Netlify configuration — Coastline Electrical Co.
# Static site at the repo root + serverless lead functions in /functions.
# The generated HTML is committed, so there's no build step.
# =====================================================================

[build]
  publish = "."
  # No build command — the site's pages are pre-generated and committed.
  # (To regenerate on Netlify instead, set: command = "python3 build/build.py")
  command = ""

[functions]
  directory = "functions"
  node_bundler = "esbuild"

# Route the site's /api/* calls to the Netlify Functions:
#   POST /api/contact   -> functions/contact.js   -> GHL_CONTACT_WEBHOOK_URL
#   POST /api/booking   -> functions/booking.js   -> GHL_BOOKING_WEBHOOK_URL
#   POST /api/chat-lead -> functions/chat-lead.js -> GHL_CHATBOT_WEBHOOK_URL
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Keep build tooling and prompts out of the published site.
[[redirects]]
  from = "/build/*"
  to = "/404.html"
  status = 404
[[redirects]]
  from = "/prompts/*"
  to = "/404.html"
  status = 404
